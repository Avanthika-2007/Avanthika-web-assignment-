<!DOCTYPE html>
<html>
<head>
    <title>Text area</title>
</head>
<body>
    <h1>Contact Us</h1>
    <p>Feel free to reach out to us using the form below</p>
    <form>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter Name here"><br><br>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Email here"><br><br>
        <label for="message">Message</label>
        <textarea id="message" name="message" placeholder="Message here"></textarea><br><br>
        <input type="submit" value="Send">
    </form>
</body>
</html>
